name: cyberdownloader
description: YouTube, TikTok & Instagram Downloader with built-in player
publish_to: 'none'
version: 5.2.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  provider: ^6.1.2

  permission_handler: ^11.3.0
  file_picker: ^8.0.0
  path_provider: ^2.1.2
  path: ^1.9.0
  open_file: ^3.3.2

  dio: ^5.4.0
  youtube_explode_dart: ^2.5.3
  connectivity_plus: ^6.0.0

  better_player: ^0.0.83
  just_audio: ^0.9.36
  video_thumbnail: ^0.5.6
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png

name: Android CI/CD Auto-Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Init Android project
      run: |
        mv lib lib_backup
        flutter create . --org com.bkurbonov660 --project-name cyberdownloader
        rm -rf lib
        mv lib_backup lib

    - name: Get dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: cyberdownloader-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
